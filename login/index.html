<!DOCTYPE html>
<html lang="ar" dir="rtl" class="astro-SGPQYURT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول - وصله</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/wslha.css">
  
<link rel="stylesheet" href="/_astro/login.780b5bcf.css" /><script type="module">const e=localStorage.getItem("wslha_user");e&&(JSON.parse(e).role==="admin"?window.location.href="/admin":window.location.href="/home");
</script></head>
<body class="astro-SGPQYURT">
  <div class="login-page astro-SGPQYURT">
    <div class="login-header astro-SGPQYURT">
      <a href="/" class="back-btn astro-SGPQYURT">← العودة للرئيسية</a>
    </div>

    <div class="login-hero astro-SGPQYURT">
      <div class="login-logo astro-SGPQYURT">🚀</div>
      <div class="login-title astro-SGPQYURT">مرحباً بعودتك!</div>
      <div class="login-subtitle astro-SGPQYURT">سجّل دخولك للاستمتاع بخدمات وصله</div>
    </div>

    <div class="login-card astro-SGPQYURT">
      <!-- Social Login -->
      <div class="social-login astro-SGPQYURT">
        <button class="social-btn astro-SGPQYURT" onclick="socialLogin('google')">
          <span class="social-icon astro-SGPQYURT">🔵</span> Google
        </button>
        <button class="social-btn astro-SGPQYURT" onclick="socialLogin('facebook')">
          <span class="social-icon astro-SGPQYURT">🔷</span> Facebook
        </button>
      </div>

      <div class="divider-text astro-SGPQYURT"><span class="astro-SGPQYURT">أو بالبريد الإلكتروني</span></div>

      <!-- Login Form -->
      <form id="loginForm" onsubmit="handleLogin(event)" class="astro-SGPQYURT">
        <div class="form-group astro-SGPQYURT">
          <label class="form-label astro-SGPQYURT">📧 البريد الإلكتروني أو رقم الهاتف</label>
          <div class="input-group astro-SGPQYURT">
            <input type="text" class="form-control form-control-icon astro-SGPQYURT" placeholder="example@email.com أو 01XXXXXXXXX" id="emailPhone" required>
            <span class="input-icon astro-SGPQYURT">📱</span>
          </div>
        </div>

        <div class="form-group astro-SGPQYURT">
          <label class="form-label astro-SGPQYURT">🔒 كلمة المرور</label>
          <div class="input-group astro-SGPQYURT">
            <input type="password" class="form-control form-control-icon astro-SGPQYURT" placeholder="أدخل كلمة المرور" id="password" required style="padding-left: 48px;">
            <span class="input-icon astro-SGPQYURT">🔑</span>
            <button type="button" class="input-eye astro-SGPQYURT" onclick="togglePassword()" id="eyeBtn">👁️</button>
          </div>
        </div>

        <div class="remember-row astro-SGPQYURT">
          <label class="remember-check astro-SGPQYURT">
            <input type="checkbox" id="remember" class="astro-SGPQYURT">
            <span class="remember-label astro-SGPQYURT">تذكّرني</span>
          </label>
          <div class="forgot-link astro-SGPQYURT" style="margin: 0;">
            <a href="#" onclick="forgotPassword()" class="astro-SGPQYURT">نسيت كلمة المرور؟</a>
          </div>
        </div>

        <button type="submit" class="login-btn astro-SGPQYURT">
          تسجيل الدخول 🚀
        </button>
      </form>

      <div class="register-link astro-SGPQYURT">
        ليس لديك حساب؟ <a href="/register" class="astro-SGPQYURT">إنشاء حساب جديد</a>
      </div>

      <!-- Features Preview -->
      <div class="features-preview astro-SGPQYURT">
        <div class="feat-item astro-SGPQYURT"><span class="feat-icon astro-SGPQYURT">🚚</span><div class="feat-text astro-SGPQYURT">توصيل سريع</div></div>
        <div class="feat-item astro-SGPQYURT"><span class="feat-icon astro-SGPQYURT">🚗</span><div class="feat-text astro-SGPQYURT">مشاوير</div></div>
        <div class="feat-item astro-SGPQYURT"><span class="feat-icon astro-SGPQYURT">✈️</span><div class="feat-text astro-SGPQYURT">المطار</div></div>
        <div class="feat-item astro-SGPQYURT"><span class="feat-icon astro-SGPQYURT">👛</span><div class="feat-text astro-SGPQYURT">محفظتك</div></div>
      </div>

      <div class="admin-link astro-SGPQYURT">
        <a href="/admin" class="astro-SGPQYURT">🛠️ لوحة تحكم الإدارة</a>
      </div>
    </div>
  </div>

  <!-- Success Toast -->
  <div class="success-toast astro-SGPQYURT" id="toast">✅ تم تسجيل الدخول بنجاح! جاري التحويل...</div>

  
</body>
</html>
